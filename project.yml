name: Flow
options:
  minimumXcodeGenVersion: 2.45.0
packages:
  NostrSDK:
    url: https://github.com/nostr-sdk/nostr-sdk-ios.git
    revision: e5855cbd3bdabf44075fd2abdf76f63bac4cbd5f
targets:
  Flow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - ShareExtension/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: social.x21.ios
        PRODUCT_NAME: Flow
        INFOPLIST_KEY_CFBundleDisplayName: Flow
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/Flow.entitlements
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: NostrSDK
      - target: FlowShareExtension
        embed: true
  FlowShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/ShareExtension
        excludes:
          - Info.plist
          - ShareExtension.entitlements
      - Sources/ShareSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: social.x21.ios.ShareExtension
        PRODUCT_NAME: FlowShareExtension
        INFOPLIST_KEY_CFBundleDisplayName: Flow
        INFOPLIST_FILE: Sources/ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ShareExtension/ShareExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
  FlowTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.0
    dependencies:
      - target: Flow
schemes:
  Flow:
    build:
      targets:
        Flow: all
    test:
      config: Debug
      targets:
        - name: FlowTests
    run:
      config: Debug
