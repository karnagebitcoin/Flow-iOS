name: Flow
options:
  minimumXcodeGenVersion: 2.45.0
fileGroups:
  - StoreKit/FlowPlus.storekit
  - STOREKIT_TESTING.md
packages:
  NostrSDK:
    url: https://github.com/nostr-sdk/nostr-sdk-ios.git
    revision: e5855cbd3bdabf44075fd2abdf76f63bac4cbd5f
targets:
  Flow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - ShareExtension/**
      - path: Vendor/nostrdb/src
        includes:
          - "*.c"
          - "bolt11/amount.c"
          - "bolt11/bech32.c"
          - "bolt11/bech32_util.c"
          - "bolt11/bolt11.c"
          - "bolt11/error.c"
          - "bolt11/hash_u5.c"
      - path: Vendor/nostrdb/flatcc
        includes:
          - builder.c
          - emitter.c
          - json_parser.c
          - refmap.c
          - verifier.c
      - path: Vendor/nostrdb/ccan/ccan
        includes:
          - crypto/sha256/sha256.c
          - list/list.c
          - mem/mem.c
          - str/str.c
          - tal/str/str.c
          - tal/tal.c
          - take/take.c
          - utf8/utf8.c
      - path: Vendor/nostrdb/mdb.c
        compilerFlags: -w
      - path: Vendor/nostrdb/midl.c
        compilerFlags: -w
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.21media.flow
        PRODUCT_NAME: Flow
        INFOPLIST_KEY_CFBundleDisplayName: Flow
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/Flow.entitlements
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        GCC_C_LANGUAGE_STANDARD: gnu11
        SWIFT_OBJC_BRIDGING_HEADER: Sources/NostrDB/Flow-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Vendor/nostrdb
          - $(PROJECT_DIR)/Vendor/nostrdb/src
          - $(PROJECT_DIR)/Vendor/nostrdb/ccan
          - $(PROJECT_DIR)/Vendor/nostrdb/ccan/ccan/short_types
          - $(PROJECT_DIR)/Vendor/nostrdb/ccan/ccan/compiler
          - $(PROJECT_DIR)/Vendor/nostrdb/flatcc
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - MDB_SHORT_SEMNAMES=1
          - MDB_SEM_NAME_PREFIX=\"flow\"
    dependencies:
      - package: NostrSDK
      - target: FlowShareExtension
        embed: true
  FlowShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/ShareExtension
        excludes:
          - Info.plist
          - ShareExtension.entitlements
      - Sources/ShareSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.21media.flow.ShareExtension
        PRODUCT_NAME: FlowShareExtension
        INFOPLIST_KEY_CFBundleDisplayName: Flow
        INFOPLIST_FILE: Sources/ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ShareExtension/ShareExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
  FlowTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.0
    dependencies:
      - target: Flow
schemes:
  Flow:
    build:
      targets:
        Flow: all
    test:
      config: Debug
      targets:
        - name: FlowTests
    run:
      config: Debug
      storeKitConfiguration: StoreKit/FlowPlus.storekit
